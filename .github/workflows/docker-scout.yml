name: Docker Build & Scout Scan

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: monsters-rolodex

jobs:
  build-and-scan:
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Scan with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          only-severities: critical,high
          exit-code: true  # fail the pipeline if CVEs are found
          sarif-file: scout-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # upload even if the scan step fails
        with:
          sarif_file: scout-results.sarif

      # - name: Push image (only if scan passes)
      #   if: github.ref == 'refs/heads/main'
      #   run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
